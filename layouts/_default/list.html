{{ define "main" }}
<div class="container">
    <div class="row">
        <div class="col-md-6 mt-3 mb-3">
            <div class="information-box">
                <h4>更新情報</h4>
                <div class="h-75 overflow-y-auto">
                    {{ with site.Data.news }}
                    {{ range . }}
                    <p style="margin-bottom: 0;">[{{ .date }}] {{ .message | safeHTML }}</p>
                    {{ end }}
                    {{ end }}
                </div>
            </div>
        </div>
        <div class="col-md-6 mt-5 mb-5">
            <b>事前参加登録受付中!!</b> (7月22日(水) 締め切り予定)<br>
            発表申込受付は終了しました<br>
         <a class="btn btn-primary" href="https://iap-jp.org/pasj/conf/member/login_portal" role="button">
                PASJ2026 参加・発表申込システム
            <img src="images/external_link.svg" alt="link icon">
        </a>
        </div>   
    </div>

    <div class="row">
        <div class="col-md-4 mb-3">
            <img src="images/pasj2026_poster.png" alt="Poster" class="img-fluid"><br>
        </div>
        <div class="col-md-4 mb-3">
            <img src="images/kondankai_poster.jpg" alt="Poster" class="img-fluid"><br>
        </div>
        <div class="col-md-4 mb-3">
            <img src="images/pasj2026_special_lecture.png" alt="Poster" class="img-fluid"><br>
        </div>
    </div>
</div>

{{ end }}
